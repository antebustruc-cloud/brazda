server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge - must stay plain HTTP, even for the domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-static/ {
        proxy_pass http://backend:8000;
    }

    location / {
        proxy_pass http://frontend:80;
    }
}

# Domain over HTTP -> redirect to HTTPS (challenge path stays plain HTTP for renewals)
server {
    listen 80;
    server_name ubrano.com.hr www.ubrano.com.hr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Domain over HTTPS
server {
    listen 443 ssl;
    server_name ubrano.com.hr www.ubrano.com.hr;

    ssl_certificate     /etc/letsencrypt/live/ubrano.com.hr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ubrano.com.hr/privkey.pem;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-static/ {
        proxy_pass http://backend:8000;
    }

    location / {
        proxy_pass http://frontend:80;
    }
}
