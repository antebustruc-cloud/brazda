services:
  db:
    image: imresamu/postgis:15-3.5-bookworm
    platform: linux/arm64          # Force ARM64 manifest explicitly
    container_name: brazda_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=brazda_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpass
    ports:
      - "5432:5432"
    healthcheck:                   # Django waits until DB is truly ready
      test: ["CMD-SHELL", "pg_isready -U admin -d brazda_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s            # PostGIS needs extra init time on ARM

  backend:
    build: ./backend
    container_name: brazda_backend
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Wait for healthcheck, not just container start

    environment:
      - SECRET_KEY=django-insecure-j-s=^=)bi^4hiv2x567g1fpec)1lvj5blibie0-(l9ad$1l*if
      - DEBUG=True
      - DB_NAME=brazda_db
      - DB_USER=admin
      - DB_PASSWORD=secretpass
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  postgres_data:
