services:
  db:
    image: imresamu/postgis:15-3.5-bookworm
    container_name: brazda_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: brazda_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: brazda_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: brazda_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: brazda_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles: ["tools"]
    # Not part of normal `docker compose up` - kept out via the "tools" profile.
    # Invoked manually, which works regardless of the profile being active
    # because explicitly naming the service activates it for that command:
    #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d ubrano.com.hr -d www.ubrano.com.hr --email YOU@EMAIL --agree-tos --no-eff-email
    #   docker compose run --rm certbot renew

  db_backup:
    image: prodrigestivill/postgres-backup-local
    container_name: brazda_db_backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080

  # Runs daily maintenance tasks against the backend container's Django management commands.
  # Uses the same backend image so it has all the same dependencies and env vars.
  cron:
    image: ubrano-backend
    container_name: brazda_cron
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      while true; do
        python manage.py delete_old_deliveries;
        sleep 86400;
      done"

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
